name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
      - 'benchmark/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
      - 'benchmark/**'
jobs:
  test:
    name: "Downgrade"
    # Preserved from the previous bespoke workflow: this job is intentionally disabled.
    if: false
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "1.10"
      group: "InterfaceI"
      skip: "Pkg,TOML"
    secrets: "inherit"
