name: "TagBot"
on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      package:
        description: "Package name to tag; empty audits every package"
        required: false
        type: string
permissions:
  actions: read
  checks: read
  contents: write
  deployments: read
  issues: read
  discussions: read
  packages: read
  pages: read
  pull-requests: read
  repository-projects: read
  security-events: read
  statuses: read

jobs:
  tagbot:
    uses: "SciML/.github/.github/workflows/monorepo-tagbot.yml@v1"
    with:
      package: "${{ inputs.package }}"
    secrets: "inherit"
