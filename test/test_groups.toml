# Test groups and Julia version matrix for the ModelingToolkit root package.
# Consumed by SciML/.github grouped-tests.yml (compute_affected_sublibraries.jl
# --root-matrix). These mirror the per-group matrix that previously lived inline
# in .github/workflows/Tests.yml.

[InterfaceI]
versions = ["lts", "1", "pre"]

[InterfaceII]
versions = ["lts", "1", "pre"]

[Initialization]
versions = ["lts", "1", "pre"]
# Memory-heavy (OOM-killed on the 4vcpu/8GB self-hosted runners, esp. on `pre`).
# Route to a GitHub-hosted runner (~16GB). `ubuntu-24.04` forces GitHub-hosted
# since the self-hosted pool only carries the `ubuntu-latest` label.
runner = "ubuntu-24.04"

[SymbolicIndexingInterface]
versions = ["lts", "1", "pre"]

[Extensions]
versions = ["lts", "1", "pre"]

[Optimization]
versions = ["lts", "1", "pre"]

[Downstream]
versions = ["lts", "1", "pre"]

[FMI]
versions = ["lts", "1", "pre"]
# Memory-heavy (OOM-killed on the 4vcpu/8GB self-hosted runners, esp. on `pre`).
# Route to a GitHub-hosted runner (~16GB). `ubuntu-24.04` forces GitHub-hosted
# since the self-hosted pool only carries the `ubuntu-latest` label.
runner = "ubuntu-24.04"

[QA]
versions = ["lts", "1"]
